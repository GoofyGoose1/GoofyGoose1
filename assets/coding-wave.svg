<svg xmlns="http://www.w3.org/2000/svg" width="900" height="130" viewBox="0 0 900 130" role="img" aria-label="Animated coding waveform">
  <rect width="900" height="130" rx="22" fill="#0d1117"/>
  <g transform="translate(35 65)">
    <g fill="#ff4f91">
      <rect x="0" y="-12" width="10" height="24" rx="5"><animate attributeName="height" values="24;76;24" dur="1.2s" repeatCount="indefinite"/><animate attributeName="y" values="-12;-38;-12" dur="1.2s" repeatCount="indefinite"/></rect>
      <rect x="18" y="-20" width="10" height="40" rx="5"><animate attributeName="height" values="40;20;40" dur="1s" repeatCount="indefinite"/><animate attributeName="y" values="-20;-10;-20" dur="1s" repeatCount="indefinite"/></rect>
      <rect x="36" y="-30" width="10" height="60" rx="5"><animate attributeName="height" values="60;32;60" dur="1.4s" repeatCount="indefinite"/><animate attributeName="y" values="-30;-16;-30" dur="1.4s" repeatCount="indefinite"/></rect>
      <rect x="54" y="-16" width="10" height="32" rx="5"><animate attributeName="height" values="32;70;32" dur=".9s" repeatCount="indefinite"/><animate attributeName="y" values="-16;-35;-16" dur=".9s" repeatCount="indefinite"/></rect>
      <rect x="72" y="-25" width="10" height="50" rx="5"><animate attributeName="height" values="50;18;50" dur="1.1s" repeatCount="indefinite"/><animate attributeName="y" values="-25;-9;-25" dur="1.1s" repeatCount="indefinite"/></rect>
    </g>
  </g>

  <text x="170" y="58" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="800">CODE · CREATE · SHIP IT</text>
  <text x="170" y="88" fill="#ff4f91" font-family="monospace" font-size="18">React  •  Node.js  •  C#  •  .NET  •  SQL</text>

  <path d="M650 67 C690 20, 740 110, 790 55 S865 70, 880 48" fill="none" stroke="#ff4f91" stroke-width="5" stroke-linecap="round" stroke-dasharray="360" stroke-dashoffset="360">
    <animate attributeName="stroke-dashoffset" values="360;0;0;360" keyTimes="0;0.55;0.8;1" dur="4s" repeatCount="indefinite"/>
  </path>
</svg>
