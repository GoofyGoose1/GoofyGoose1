    @keyframes pulse{50%{opacity:.25}}
  </style>
  <path class="wave" d="M-100 55C80 5 220 105 400 55S720 5 900 55s320 50 500 0v80H-100z" fill="url(#g)" opacity=".18"/>
  <path class="wave" d="M-80 75c170-48 300 42 470 0s300-48 470 0 300 42 470 0" fill="none" stroke="url(#g)" stroke-width="2" opacity=".75"/>
  <circle class="dot" cx="600" cy="75" r="5" fill="#00d9ff"/>
</svg>
