<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="130" viewBox="0 0 1200 130">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00d9ff"/><stop offset=".5" stop-color="#7c3aed"/><stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <style>
    .wave{animation:move 7s ease-in-out infinite alternate}
    .dot{animation:pulse 2s ease-in-out infinite}
