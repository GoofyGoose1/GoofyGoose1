<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Daniel Edri, Junior Full-Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060b18"/>
      <stop offset=".5" stop-color="#111827"/>
      <stop offset="1" stop-color="#170b2d"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d9ff"/>
      <stop offset=".5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#00d9ff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#00d9ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#94a3b8" stroke-opacity=".08"/>
    </pattern>
    <clipPath id="typingClip">
      <rect x="0" y="0" width="0" height="40">
        <animate attributeName="width" values="0;620;620;0" keyTimes="0;.45;.88;1" dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <style>
    .orb1 { animation: drift1 9s ease-in-out infinite alternate; }
    .orb2 { animation: drift2 11s ease-in-out infinite alternate; }
    .pulse { animation: pulse 2.7s ease-in-out infinite; transform-origin:center; }
    .spin { animation: spin 18s linear infinite; transform-origin: 1030px 178px; }
    .blink { animation: blink 1s step-end infinite; }
    .scan { animation: scan 5s linear infinite; }
    @keyframes drift1 { to { transform: translate(80px,28px) scale(1.12); } }
    @keyframes drift2 { to { transform: translate(-65px,-35px) scale(.9); } }
    @keyframes pulse { 50% { opacity:.45; transform:scale(1.06); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes blink { 50% { opacity:0; } }
    @keyframes scan { from { transform:translateY(-80px); } to { transform:translateY(440px); } }
  </style>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>

  <circle class="orb1" cx="135" cy="65" r="180" fill="url(#glow)"/>
  <circle class="orb2" cx="1060" cy="310" r="220" fill="url(#glow)" opacity=".55"/>

  <g opacity=".8">
    <circle cx="58" cy="52" r="4" fill="#ec4899"/>
    <circle cx="78" cy="52" r="4" fill="#fbbf24"/>
    <circle cx="98" cy="52" r="4" fill="#22c55e"/>
    <text x="125" y="58" fill="#64748b" font-family="monospace" font-size="16">profile://daniel-edri</text>
  </g>

  <rect x="43" y="79" width="1114" height="238" rx="18" fill="#020617" fill-opacity=".48" stroke="#334155" stroke-opacity=".7"/>
  <rect x="43" y="79" width="5" height="238" rx="3" fill="url(#neon)" filter="url(#softGlow)"/>

  <text x="92" y="146" fill="#94a3b8" font-family="monospace" font-size="18">HELLO, WORLD — I'M</text>
  <text x="88" y="211" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="64" letter-spacing="1">DANIEL EDRI</text>

  <g transform="translate(91 239)">
    <g clip-path="url(#typingClip)">
      <text x="0" y="29" fill="url(#neon)" font-family="monospace" font-weight="700" font-size="25">Junior Full-Stack Developer · Frontend · UI/UX</text>
    </g>
    <rect class="blink" x="628" y="5" width="3" height="30" fill="#00d9ff"/>
  </g>

  <g class="spin" opacity=".9">
    <circle cx="1030" cy="178" r="79" fill="none" stroke="#00d9ff" stroke-width="1.5" stroke-dasharray="8 12"/>
    <circle cx="1030" cy="178" r="61" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="3 9"/>
    <circle cx="1030" cy="99" r="5" fill="#ec4899" filter="url(#softGlow)"/>
    <circle cx="1091" cy="178" r="4" fill="#00d9ff" filter="url(#softGlow)"/>
  </g>
  <g class="pulse">
    <path d="M1030 127l44 25v51l-44 26-44-26v-51z" fill="#0f172a" stroke="url(#neon)" stroke-width="3"/>
    <text x="1030" y="187" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-weight="700" font-size="27">&lt;/&gt;</text>
  </g>

  <rect class="scan" x="50" y="-50" width="1100" height="60" fill="url(#neon)" opacity=".025"/>
  <rect x="0.75" y="0.75" width="1198.5" height="358.5" rx="27" fill="none" stroke="url(#neon)" stroke-opacity=".55" stroke-width="1.5"/>
</svg>
