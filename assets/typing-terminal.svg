<svg xmlns="http://www.w3.org/2000/svg" width="900" height="150" viewBox="0 0 900 150" role="img" aria-label="Animated developer terminal">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-opacity=".35"/>
    </filter>
    <clipPath id="typingClip">
      <rect x="95" y="74" width="0" height="34">
        <animate attributeName="width" values="0;690;690;0" keyTimes="0;0.58;0.88;1" dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect x="18" y="18" width="864" height="114" rx="18" fill="#0d1117" stroke="#30363d" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="48" cy="45" r="7" fill="#ff5f57"/>
  <circle cx="72" cy="45" r="7" fill="#febc2e"/>
  <circle cx="96" cy="45" r="7" fill="#28c840"/>

  <text x="45" y="94" fill="#ff4f91" font-family="monospace" font-size="29" font-weight="700">&gt;</text>

  <g clip-path="url(#typingClip)">
    <text x="95" y="95" fill="#f5f5f5" font-family="monospace" font-size="27">
      Daniel Edri — Junior Full-Stack Developer
    </text>
  </g>

  <rect x="95" y="73" width="4" height="31" fill="#ff4f91">
    <animate attributeName="opacity" values="1;0;1" dur=".8s" repeatCount="indefinite"/>
    <animate attributeName="x" values="95;785;785;95" keyTimes="0;0.58;0.88;1" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
